<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запуск скриптов по нажатию</title>
    <style>
        li { cursor: pointer; }
    </style>
</head>
<body>
    <h2>Задачи:</h2>
    <ol id="myList">
        <li data-script="1_scriptMonths.js">Вывод названия месяца</li>
        <li data-script="2_scriptSimpleNumber.js">Вывод массива простых чисел</li>
        <li data-script="3_scriptCounter.js">Изменение Counter</li>
        <li data-script="4_scriptWordsList.js">Преобразование списка слов</li>
        <li data-script="5_scriptPallindrom.js">Проверка строки на паллиндром</li>
    </ol>

    <script>
        function loadScript(scriptUrl) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = scriptUrl;
                script.onload = () => resolve();
                script.onerror = () => reject(new Error(`Ошибка загрузки скрипта ${scriptUrl}`));
                document.body.appendChild(script);
            });
        }

        async function handleClick(event) {
            const scriptUrl = event.target.getAttribute('data-script');
            try {
                await loadScript(scriptUrl);
                console.log('Скрипт загружен и выполнен:', scriptUrl);
            } catch (error) {
                console.error(error);
            }
        }

        const list = document.getElementById('myList');

        list.querySelectorAll('li').forEach(item => {
            item.addEventListener('click', handleClick);
        });
    </script>
</body>
</html>
